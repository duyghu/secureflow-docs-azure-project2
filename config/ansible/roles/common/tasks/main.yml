---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install baseline packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - unzip
      - nginx
      - openjdk-21-jre-headless
    state: present

- name: Ensure unattended security upgrades are installed
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present

- name: Enable unattended upgrades
  ansible.builtin.service:
    name: unattended-upgrades
    enabled: true
    state: started
