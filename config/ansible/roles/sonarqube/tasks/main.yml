---
- name: Install SonarQube runtime packages
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-compose-v2
    state: present

- name: Enable Docker
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started

- name: Create SonarQube directory
  ansible.builtin.file:
    path: /opt/sonarqube
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Render SonarQube compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/sonarqube/docker-compose.yml
    owner: root
    group: root
    mode: "0644"

- name: Start SonarQube
  community.docker.docker_compose_v2:
    project_src: /opt/sonarqube
    state: present
