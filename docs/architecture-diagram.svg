  <text x="1006" y="504" font-family="Arial" font-size="13" fill="#153b6f">Metric alerts</text>
  <line x1="38" y1="315" x2="136" y2="315" stroke="#0f4c45" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="48" y="296" font-family="Arial" font-size="13" fill="#173a35">Internet</text>
  <line x1="266" y1="315" x2="380" y2="315" stroke="#0f4c45" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="304" y="296" font-family="Arial" font-size="13" fill="#173a35">/</text>
  <line x1="266" y1="315" x2="618" y2="315" stroke="#b98016" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="430" y="296" font-family="Arial" font-size="13" fill="#594811">/api/*</text>
  <line x1="681" y1="344" x2="534" y2="494" stroke="#0f4c45" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="534" y1="523" x2="582" y2="523" stroke="#0f4c45" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1085" y1="338" x2="1085" y2="390" stroke="#8aa8d8" stroke-width="3" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0f4c45"/>
    </marker>
  </defs>
</svg>
