server:
  port: ${SERVER_PORT:8080}
  servlet:
    session:
      cookie:
        http-only: true
        same-site: strict

spring:
  application:
    name: secureflow-docs-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:secureflow;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

applicationinsights:
  connection:
    string: ${APPLICATIONINSIGHTS_CONNECTION_STRING:}
