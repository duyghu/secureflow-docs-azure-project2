name: Frontend

on:
  push:
    branches: ["main"]
    paths:
      - "apps/frontend/**"
      - "config/ansible/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "apps/frontend/**"
      - "config/ansible/**"

jobs:
  build-scan-package:
    runs-on: [self-hosted, Linux, X64, secureflow-ops]
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package artifact
        run: tar -czf dist.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: secureflow-frontend
          path: apps/frontend/dist.tar.gz

  deploy:
    needs: build-scan-package
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, Linux, X64, secureflow-ops]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: secureflow-frontend
          path: apps/frontend

      - name: Deploy frontend from self-hosted ops runner
        env:
          OPS_SSH_KEY: ${{ secrets.OPS_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$OPS_SSH_KEY" > ~/.ssh/group1-final_key.pem
          chmod 600 ~/.ssh/group1-final_key.pem
          sudo apt-get update
          sudo apt-get install -y ansible python3-pip
          ansible-galaxy collection install -r config/ansible/requirements.yml
          ANSIBLE_HOST_KEY_CHECKING=False \
            FRONTEND_ARTIFACT="$GITHUB_WORKSPACE/apps/frontend/dist.tar.gz" \
            ansible-playbook config/ansible/site.yml --limit frontend -i config/ansible/inventories/prod/hosts.ini --private-key ~/.ssh/group1-final_key.pem
