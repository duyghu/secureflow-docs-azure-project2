name: Frontend

on:
  push:
    branches: ["main"]
    paths:
      - "apps/frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "apps/frontend/**"
      - ".github/workflows/frontend.yml"

permissions:
  id-token: write
  contents: read

jobs:
  build-scan-package:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
        run: npm run build

      - name: Package artifact
        run: tar -czf dist.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: secureflow-frontend
          path: apps/frontend/dist.tar.gz

  deploy:
    needs: build-scan-package
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      RESOURCE_GROUP: rg-secureflow-project2
      STORAGE_ACCOUNT: tfstatesfdocs2duyghu
      ARTIFACT_CONTAINER: artifacts
      FRONTEND_VMSS_NAME: vmss-secureflow-dev-frontend
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: secureflow-frontend
          path: apps/frontend

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure artifact storage RBAC
        run: |
          set -euo pipefail
          STORAGE_SCOPE=$(az storage account show -n "$STORAGE_ACCOUNT" -g "$RESOURCE_GROUP" --query id -o tsv)
          az role assignment create --assignee "$AZURE_CLIENT_ID" --role "Storage Account Key Operator Service Role" --scope "$STORAGE_SCOPE" --only-show-errors >/dev/null || true
          az role assignment create --assignee "$AZURE_CLIENT_ID" --role "Storage Blob Data Contributor" --scope "$STORAGE_SCOPE" --only-show-errors >/dev/null || true
          sleep 30

      - name: Upload frontend artifact to private deployment storage
        run: |
          set -euo pipefail
          az storage container create --account-name "$STORAGE_ACCOUNT" --name "$ARTIFACT_CONTAINER" --auth-mode key --only-show-errors >/dev/null
          az storage blob upload \
            --account-name "$STORAGE_ACCOUNT" \
            --container-name "$ARTIFACT_CONTAINER" \
            --name secureflow-frontend-dist.tar.gz \
            --file apps/frontend/dist.tar.gz \
            --overwrite \
            --auth-mode key \
            --only-show-errors >/dev/null

      - name: Deploy frontend to private VMSS through Azure Run Command
        run: |
          set -euo pipefail
          EXPIRY=$(date -u -d '+2 hours' '+%Y-%m-%dT%H:%MZ')
          ARTIFACT_URL=$(az storage blob generate-sas \
            --account-name "$STORAGE_ACCOUNT" \
            --container-name "$ARTIFACT_CONTAINER" \
            --name secureflow-frontend-dist.tar.gz \
            --permissions r \
            --expiry "$EXPIRY" \
            --full-uri \
            --auth-mode key \
            --only-show-errors \
            -o tsv)

          SCRIPT=$(cat <<SCRIPT_EOF
          set -eu
          install -d -m 755 /opt/secureflow/frontend
          curl -fsSL '$ARTIFACT_URL' -o /tmp/secureflow-frontend-dist.tar.gz
          rm -rf /opt/secureflow/frontend/*
          tar -xzf /tmp/secureflow-frontend-dist.tar.gz -C /opt/secureflow/frontend
          printf ok > /opt/secureflow/frontend/health
          printf '%s\n' \
            '[Unit]' \
            'Description=SecureFlow Frontend' \
            'After=network-online.target' \
            '' \
            '[Service]' \
            'WorkingDirectory=/opt/secureflow/frontend' \
            'ExecStart=/usr/bin/python3 -m http.server 80' \
            'Restart=always' \
            'RestartSec=5' \
            '' \
            '[Install]' \
            'WantedBy=multi-user.target' \
            > /etc/systemd/system/secureflow-frontend.service
          systemctl daemon-reload
          systemctl enable --now secureflow-frontend
          systemctl restart secureflow-frontend
          for attempt in 1 2 3 4 5; do
            curl -fsS http://127.0.0.1/health && exit 0
            sleep 2
          done
          exit 1
          SCRIPT_EOF
          )

          az vmss run-command invoke \
            --resource-group "$RESOURCE_GROUP" \
            --name "$FRONTEND_VMSS_NAME" \
            --instance-id 0 \
            --command-id RunShellScript \
            --scripts "$SCRIPT" \
            --only-show-errors
