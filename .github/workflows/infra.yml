name: Infrastructure

on:
  workflow_dispatch:
    inputs:
      terraform_action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
  pull_request:
    paths:
      - "infra/terraform/**"
  push:
    branches: ["main"]
    paths:
      - "infra/terraform/**"

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: [self-hosted, Linux, X64, secureflow-ops]
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TFSTATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.TFSTATE_CONTAINER }}" \
            -backend-config="key=secureflow-${{ vars.ENVIRONMENT || 'dev' }}.tfstate"

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: |
          terraform plan \
            -var="resource_group_name=${{ vars.RESOURCE_GROUP_NAME || 'group1_final' }}" \
            -var="vnet_name=${{ vars.VNET_NAME || 'group1-final-vnet' }}" \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -var="sql_admin_password=${{ secrets.SQL_ADMIN_PASSWORD }}" \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
            -var="appgw_ssl_certificate_base64=${{ secrets.APPGW_SSL_CERTIFICATE_BASE64 }}" \
            -var="appgw_ssl_certificate_password=${{ secrets.APPGW_SSL_CERTIFICATE_PASSWORD }}" \
            -out=tfplan

      - name: Terraform apply
        if: github.event_name == 'workflow_dispatch' && inputs.terraform_action == 'apply'
        run: terraform apply -auto-approve tfplan
